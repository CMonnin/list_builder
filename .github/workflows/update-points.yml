name: Update Points Data

on:
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "URL to the GW Munitorum Field Manual PDF"
        required: true

jobs:
  update-points:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -r requirements.txt

      - name: Run extraction script
        run: |
          uv run python scripts/update_points.py \
            --url "${{ inputs.pdf_url }}" \
            --output points.json

      - name: Commit and push if changed
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if ! git diff --quiet points.json; then
            git add points.json
            git commit -m "Update points data - $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes to points.json — nothing to commit."
          fi
